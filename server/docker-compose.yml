services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost"
    expose:
      - "8080"
    cpus: "0.50"
    mem_limit: 256m

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    cpus: "0.25"
    mem_limit: 128m

